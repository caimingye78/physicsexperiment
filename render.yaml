services:
  - type: web
    name: physicsexperiment-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: AI_API_URL
        value: https://api.deepseek.com/v1/chat/completions
      - key: AI_MODEL
        value: deepseek-chat
      - key: AI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: caimingye78/physicsexperiment
      - key: GITHUB_BRANCH
        value: main
      - key: GITHUB_SAVE_PATH
        value: ai-saved-plans
