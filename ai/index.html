<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>物理创新实验 · AI生成与分析平台</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Microsoft YaHei",Arial,sans-serif;background:#f0f4f8;color:#2d3748}
  header{background:linear-gradient(135deg,#1a73e8,#6c5ce7);color:#fff;padding:24px;text-align:center}
  header h1{font-size:1.5rem}
  header p{opacity:.85;margin-top:6px;font-size:.9rem}
  .container{max-width:1150px;margin:20px auto;padding:0 16px;display:grid;grid-template-columns:320px 1fr;gap:16px}
  .card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
  .gen-box{display:flex;gap:8px;margin-bottom:12px}
  input{flex:1;min-width:0;padding:10px;border:1px solid #cbd5e0;border-radius:8px;font-size:.95rem}
  button{background:#1a73e8;color:#fff;border:none;padding:10px 16px;border-radius:8px;cursor:pointer;font-size:.9rem}
  button:hover{filter:brightness(.92)}
  button:disabled{background:#a0aec0;cursor:not-allowed}
  button.green{background:#38a169}
  button.orange{background:#ed8936}
  button.small{padding:5px 10px;font-size:.8rem}
  .tags{margin:8px 0;font-size:.78rem;color:#718096}
  .tags span{cursor:pointer;color:#1a73e8;margin-right:10px}
  .backend-box{display:flex;gap:8px;margin:12px 0 6px}
  .backend-box input{font-size:.82rem}
  .hint{font-size:.76rem;color:#718096;line-height:1.5;margin-bottom:8px}
  .item{padding:12px;border-bottom:1px solid #edf2f7;cursor:pointer;border-radius:8px}
  .item:hover,.item.active{background:#ebf4ff}
  .item h4{font-size:.92rem;color:#1a56a8}
  .item .meta{font-size:.74rem;color:#718096;margin-top:3px}
  .badge{display:inline-block;font-size:.68rem;padding:1px 8px;border-radius:10px;margin-left:6px;color:#fff}
  .b1{background:#38a169}
  .b2{background:#ed8936}
  .section{margin-top:16px}
  .section h5{color:#fff;background:#4a5568;padding:6px 12px;border-radius:6px;font-size:.9rem}
  .md{padding:12px;background:#f7fafc;border-radius:8px;font-size:.9rem;line-height:1.75;margin-top:6px;overflow:auto}
  .md h2{font-size:1.05rem;color:#1a56a8;margin:12px 0 6px}
  .md h3{font-size:.95rem;margin:10px 0 4px}
  .md table{border-collapse:collapse;width:100%;margin:8px 0}
  .md th,.md td{border:1px solid #cbd5e0;padding:5px 8px;font-size:.85rem}
  .md th{background:#ebf4ff}
  .md ul,.md ol{padding-left:22px}
  .md code{background:#edf2f7;padding:1px 4px;border-radius:3px}
  .toolbar{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
  #status{font-size:.85rem;color:#e53e3e;margin-top:8px;min-height:1.2em}
  .empty{color:#a0aec0;text-align:center;padding:40px 0}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(max-width:800px){.container{grid-template-columns:1fr}.gen-box{flex-direction:column}}
</style>
</head>
<body>
<header>
  <h1>中学生物理创新实验 · AI 生成与分析平台</h1>
  <p>输入主题 → AI生成方案 → AI分析 → 不断迭代改进</p>
</header>

<div class="container">
  <div class="card">
    <div class="gen-box">
      <input id="topic" placeholder="输入实验主题，如：电磁感应">
      <button id="genBtn" onclick="doGen()">生成方案</button>
    </div>
    <div class="tags">试试：
      <span onclick="quick('浮力')">浮力</span>
      <span onclick="quick('电磁感应')">电磁感应</span>
      <span onclick="quick('凸透镜成像')">凸透镜成像</span>
      <span onclick="quick('自制乐器与声音')">声音</span>
    </div>
    <div class="backend-box">
      <input id="backendUrl" placeholder="后端地址，例如 https://xxx.onrender.com">
      <button class="small" onclick="saveBackendUrl()">连接</button>
    </div>
    <div class="hint">AI 生成功能需要先部署 Flask 后端。地址保存后会自动用于本页面。</div>
    <div id="status"></div>
    <h4 style="margin:10px 0 6px;color:#4a5568">方案库 <span id="cnt"></span></h4>
    <div id="list"><div class="empty">还没有方案，输入主题生成第一个吧</div></div>
  </div>

  <div class="card" id="detail"><div class="empty">生成或点击左侧方案查看详情</div></div>
</div>

<script>
let cur = null;
const DEFAULT_API_BASE = "https://physicsexperiment-backend.onrender.com";
const md = t => marked.parse(t || "");

function apiBase() {
  return (localStorage.getItem("physicsApiBase") || DEFAULT_API_BASE).replace(/\/+$/, "");
}

function saveBackendUrl() {
  const v = document.getElementById("backendUrl").value.trim().replace(/\/+$/, "");
  if (!v) return S("请输入后端地址");
  localStorage.setItem("physicsApiBase", v);
  S("后端地址已保存，正在重新连接...");
  loadList();
}

async function api(u, m = "GET", b = null) {
  const r = await fetch(apiBase() + u, {
    method: m,
    headers: {"Content-Type": "application/json"},
    body: b ? JSON.stringify(b) : null
  });
  if (!r.ok) {
    throw new Error(`后端返回 ${r.status}，请确认服务已经部署并正在运行`);
  }
  const text = await r.text();
  try {
    return JSON.parse(text);
  } catch (e) {
    console.error("接口返回的不是JSON：", text);
    throw new Error("后端返回异常：" + text.slice(0, 200));
  }
}

const S = m => document.getElementById("status").textContent = m;

function quick(t) {
  document.getElementById("topic").value = t;
  doGen();
}

async function doGen() {
  const t = document.getElementById("topic").value.trim();
  if (!t) return S("请输入实验主题");
  const b = document.getElementById("genBtn");
  b.disabled = true;
  b.innerHTML = '<span class="spinner"></span> 生成中...';
  S("AI 正在设计方案，约需 10-30 秒...");
  try {
    const res = await api("/api/generate", "POST", {topic: t});
    if (res.ok) {
      S("方案已生成");
      cur = res.id;
      await loadList();
      showPlan(res.id);
    } else {
      S(res.msg || "生成失败");
    }
  } catch (e) {
    S("生成失败：" + e.message);
  }
  b.disabled = false;
  b.textContent = "生成方案";
}

async function loadList() {
  try {
    const ps = await api("/api/list");
    document.getElementById("cnt").textContent = `(${ps.length})`;
    const box = document.getElementById("list");
    if (!ps.length) {
      box.innerHTML = '<div class="empty">暂无方案</div>';
      return;
    }
    box.innerHTML = ps.map(p => `
      <div class="item ${p.id === cur ? 'active' : ''}" onclick="showPlan(${p.id})">
        <h4>${p.topic}
          ${p.a ? '<span class="badge b1">已分析</span>' : ''}
          ${p.i ? `<span class="badge b2">改进v${p.version}</span>` : ''}</h4>
        <div class="meta">${p.created}</div></div>`).join("");
  } catch (e) {
    document.getElementById("cnt").textContent = "";
    document.getElementById("list").innerHTML = '<div class="empty">后端还没连接，部署后端并填写地址后即可使用</div>';
    S("暂时无法连接后端：" + e.message);
  }
}

async function showPlan(id) {
  cur = id;
  loadList();
  const p = await api("/api/get/" + id);
  document.getElementById("detail").innerHTML = `
    <h3 style="color:#1a56a8">${p.topic}</h3>
    <div class="section"><h5>AI 生成方案</h5><div class="md">${md(p.plan)}</div></div>
    ${p.improved ? `<div class="section"><h5>改进版方案（第 ${p.version} 次迭代）</h5>
      <div class="md">${md(p.improved)}</div></div>` : ''}
    <div class="section"><h5>AI 分析报告</h5>
      <div class="md" id="anaBox">${p.analysis ? md(p.analysis) : '<span style="color:#a0aec0">尚未分析</span>'}</div></div>
    <div class="toolbar">
      <button class="green" id="aBtn" onclick="doAna(${id})">AI 分析</button>
      <button class="orange" id="iBtn" onclick="doImp(${id})">迭代改进</button>
      <button class="small" style="background:#e53e3e" onclick="doDel(${id})">删除</button>
    </div>`;
}

async function doAna(id) {
  const b = document.getElementById("aBtn");
  b.disabled = true;
  b.innerHTML = '<span class="spinner"></span> 分析中...';
  const res = await api("/api/analyze/" + id, "POST");
  if (res.ok) document.getElementById("anaBox").innerHTML = md(res.analysis);
  b.disabled = false;
  b.textContent = "AI 分析";
  loadList();
}

async function doImp(id) {
  const b = document.getElementById("iBtn");
  b.disabled = true;
  b.innerHTML = '<span class="spinner"></span> 改进中...';
  await api("/api/improve/" + id, "POST");
  showPlan(id);
}

async function doDel(id) {
  if (!confirm("确定删除？")) return;
  await api("/api/delete/" + id, "POST");
  cur = null;
  document.getElementById("detail").innerHTML = '<div class="empty">选择方案查看</div>';
  loadList();
}

document.getElementById("backendUrl").value = apiBase();
loadList();
</script>
</body>
</html>
