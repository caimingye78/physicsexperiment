<svg xmlns="http://www.w3.org/2000/svg" width="780" height="440" viewBox="0 0 780 440" font-family="Segoe UI, PingFang SC, sans-serif">
  <defs>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4cc9f0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4cc9f0" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <rect width="780" height="440" fill="#0d1b2a"/>
  <text x="30" y="40" fill="#e0e1dd" font-size="24" font-weight="bold">双缝干涉：杨氏实验原理</text>
  <text x="30" y="66" fill="#9aa6b2" font-size="14">I = I0 · cos^2(pi·d·sinθ/λ) · sinc^2(pi·a·sinθ/λ)　　Δy ≈ λ·L/d</text>

  <!-- light source -->
  <circle cx="70" cy="230" r="12" fill="#4cc9f0"/>
  <text x="46" y="270" fill="#9aa6b2" font-size="13">单色光源</text>

  <!-- incoming beam -->
  <polygon points="82,224 300,206 300,254 82,236" fill="url(#beam)"/>

  <!-- double-slit barrier -->
  <rect x="300" y="90" width="14" height="280" fill="#1b263b" stroke="#9aa6b2" stroke-width="1"/>
  <rect x="300" y="206" width="14" height="10" fill="#0d1b2a"/>
  <rect x="300" y="244" width="14" height="10" fill="#0d1b2a"/>
  <text x="276" y="392" fill="#9aa6b2" font-size="13">双缝</text>
  <!-- d marker -->
  <line x1="330" y1="211" x2="330" y2="249" stroke="#4cc9f0" stroke-width="1.5"/>
  <text x="336" y="234" fill="#4cc9f0" font-size="13">d</text>

  <!-- spreading wavefronts -->
  <g stroke="#4cc9f0" fill="none" stroke-width="1.2" opacity="0.55">
    <path d="M314,211 A40,40 0 0 1 314,211" />
    <circle cx="307" cy="211" r="40"/><circle cx="307" cy="211" r="80"/>
    <circle cx="307" cy="211" r="120"/><circle cx="307" cy="211" r="160"/>
    <circle cx="307" cy="249" r="40"/><circle cx="307" cy="249" r="80"/>
    <circle cx="307" cy="249" r="120"/><circle cx="307" cy="249" r="160"/>
  </g>

  <!-- screen -->
  <rect x="690" y="80" width="12" height="300" fill="#274b63"/>
  <text x="676" y="396" fill="#9aa6b2" font-size="13">屏</text>

  <!-- fringes on screen -->
  <g>
    <rect x="704" y="120" width="26" height="14" fill="#e0e1dd"/>
    <rect x="704" y="150" width="26" height="14" fill="#9aa6b2" opacity="0.5"/>
    <rect x="704" y="180" width="26" height="14" fill="#e0e1dd"/>
    <rect x="704" y="210" width="26" height="14" fill="#9aa6b2" opacity="0.5"/>
    <rect x="704" y="222" width="26" height="16" fill="#ffffff"/>
    <rect x="704" y="248" width="26" height="14" fill="#9aa6b2" opacity="0.5"/>
    <rect x="704" y="270" width="26" height="14" fill="#e0e1dd"/>
    <rect x="704" y="300" width="26" height="14" fill="#9aa6b2" opacity="0.5"/>
    <rect x="704" y="320" width="26" height="14" fill="#e0e1dd"/>
  </g>
  <text x="734" y="234" fill="#4cc9f0" font-size="12">亮纹</text>
  <!-- Δy marker -->
  <line x1="744" y1="187" x2="744" y2="229" stroke="#4cc9f0" stroke-width="1.5"/>
  <text x="748" y="212" fill="#4cc9f0" font-size="12">Δy</text>

  <!-- L distance -->
  <line x1="307" y1="358" x2="690" y2="358" stroke="#9aa6b2" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="470" y="352" fill="#9aa6b2" font-size="13">屏距 L</text>

  <!-- intensity curve preview at bottom -->
  <g transform="translate(0,0)">
    <path d="M330,420 q10,-2 20,0 q8,18 16,0 q8,-30 16,0 q8,40 16,0 q8,-60 16,0 q8,40 16,0 q8,-30 16,0 q8,18 16,0 q10,2 20,0"
          fill="none" stroke="#4cc9f0" stroke-width="1.6" opacity="0.7"/>
  </g>
  <text x="30" y="424" fill="#9aa6b2" font-size="12">中央最亮，向两侧按 cos² 起伏并被单缝衍射包络压低</text>
</svg>
